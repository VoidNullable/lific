name: Release

# Triggered by pushing a version tag (e.g. v1.4.0).
#
# The tag MUST originate on magi (origin) so the magi→github push mirror
# replicates it. Do NOT have this workflow create the tag on the github side:
# the mirror runs `git push --mirror`, which prunes any github ref that isn't
# on magi. A github-only tag therefore gets deleted on the next mirror sync,
# and github silently demotes the now-tagless release to a *draft*. That
# stranded every release v1.2.0–v1.3.1 (LIF-120). Because the tag now comes
# from magi, the mirror keeps it and the release stays published.
#
# Release ritual (see AGENTS.md "Releasing a new version"):
#   1. bump Cargo.toml, commit, `git push`            (no release yet)
#   2. `git tag vX.Y.Z && git push origin vX.Y.Z`     (fires this workflow)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the tag and Cargo.toml disagree — otherwise we'd ship a
  # GitHub release named one version while crates.io publishes another.
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        id: v
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          echo "tag=${GITHUB_REF_NAME} (version ${TAG_VERSION}), Cargo.toml=${CARGO_VERSION}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}. Bump Cargo.toml to ${TAG_VERSION} (or tag the right commit) before releasing."
            exit 1
          fi
          echo "version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"

  test:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure web/dist exists for rust-embed
        run: mkdir -p web/dist
      - run: cargo test

  build:
    needs: [verify, test]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: lific-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: lific-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: lific-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Build the embedded web UI before cargo build, so rust-embed
      # picks it up and bakes it into the release binary. Without this
      # the binary would ship without a web frontend.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
        shell: bash

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/lific ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      # Use the curated top section of CHANGELOG.md as the release notes
      # (accurate, human-written) instead of gh's autogenerated commit list.
      # Extracts everything between the first "## " heading and the next one.
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## /{n++; next} n==1{print}' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes preview -----"
          cat RELEASE_NOTES.md

      # The tag already exists (it triggered this run); gh attaches the
      # release to it. We do NOT create or push a tag here — see the header.
      # Fall back to --generate-notes if the CHANGELOG section came up empty
      # (e.g. someone forgot to add the entry), so a release never ships
      # with no notes at all.
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARG="--generate-notes"
          if [ -s RELEASE_NOTES.md ]; then
            NOTES_ARG="--notes-file RELEASE_NOTES.md"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            $NOTES_ARG \
            --latest \
            binaries/lific-linux-x86_64 \
            binaries/lific-linux-aarch64 \
            binaries/lific-macos-x86_64 \
            binaries/lific-macos-aarch64 \
            binaries/sha256sums.txt

      # Belt-and-suspenders against gh's occasional draft-fallback at create
      # time. The real fix for the LIF-120 strandings is the magi-origin tag
      # above; this just re-asserts the published state and is idempotent.
      - name: Publish release (force non-draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --draft=false \
            --latest

  publish:
    needs: [verify, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Build the web UI before publishing so the source tarball that
      # goes to crates.io contains a working dist/, not just a stub.
      # `cargo install lific` builds from source — without this, every
      # crates.io install would produce a UI-less binary.
      - uses: oven-sh/setup-bun@v2
      - name: Build web frontend
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build
      - name: Publish to crates.io
        run: cargo publish --allow-dirty --no-verify || echo "Publish failed (version may already exist)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
