name: Auto-tag on version bump

on:
  push:
    branches: [master]
    paths:
      - 'Cargo.toml'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change and create tag
        run: |
          CURRENT="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          PREVIOUS="$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo '')"

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "Version unchanged ($CURRENT), skipping"
            exit 0
          fi

          TAG="v${CURRENT}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          echo "Version changed: ${PREVIOUS:-none} -> ${CURRENT}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"
